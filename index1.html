  "content": "<!DOCTYPE html>\n<html lang=\"ar\" dir=\"rtl\">\n<head>\n<meta charset=\"UTF-8\">\n<meta name=\"viewport\" content=\"width=device-width, initial-scale=1.0\">\n<title>نظام إدارة الصحة والسلامة المهنية (HSE)</title>\n<link rel=\"preconnect\" href=\"https://fonts.googleapis.com\">\n<link href=\"https://fonts.googleapis.com/css2?family=Cairo:wght@600;700;800&family=Tajawal:wght@400;500;700&family=Inter:wght@400;500;600;700;800&display=swap\" rel=\"stylesheet\">\n<style>\n:root{\n  --navy-950:#050b17; --navy-900:#0a1428; --navy-800:#0f1e3d; --navy-700:#152a52; --navy-600:#1c3968;\n  --blue-500:#2b57e0; --blue-400:#3f6bff; --blue-300:#7d9bff;\n  --gold:#e0b04b; --gold-dark:#c9890a;\n  --white:#f5f7fc; --muted:#93a4c4; --border:rgba(125,155,255,.16);\n  --red:#ef5a5a; --red-bg:rgba(239,90,90,.12);\n  --green:#3ecf8e; --green-bg:rgba(62,207,142,.12);\n  --info:#5aa8ef; --info-bg:rgba(90,168,239,.12);\n}\n*{box-sizing:border-box; margin:0; padding:0;}\nbody{font-family:'Tajawal',sans-serif; background:var(--navy-950); color:var(--white); font-size:15px;}\nhtml[data-lang=\"en\"] body{font-family:'Inter',sans-serif;}\nh1,h2,h3,.brand-text,.nav-item span.label{font-family:'Cairo',sans-serif;}\nhtml[data-lang=\"en\"] h1, html[data-lang=\"en\"] h2, html[data-lang=\"en\"] h3,\nhtml[data-lang=\"en\"] .brand-text, html[data-lang=\"en\"] .nav-item span.label{font-family:'Inter',sans-serif; font-weight:700;}\n.icon{width:20px;height:20px;stroke:currentColor;fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round; flex-shrink:0;}\n.grad-bar{height:4px; background:linear-gradient(90deg,var(--blue-500),var(--blue-300),var(--gold));}\n#app{display:flex; min-height:100vh;}\n.sidebar{width:258px; background:linear-gradient(180deg,var(--navy-900),var(--navy-950)); border-inline-end:1px solid var(--border); color:#fff; display:flex; flex-direction:column; flex-shrink:0;}\n.sidebar .brand{padding:22px 18px 16px; display:flex; flex-direction:column; align-items:center; text-align:center; border-bottom:1px solid var(--border);}\n.brand-mark{width:58px; height:58px; margin-bottom:8px;}\n.brand-text{font-size:19px; font-weight:800; letter-spacing:.5px;}\n.brand-sub{font-family:'Tajawal',sans-serif; font-weight:400; font-size:11.5px; color:var(--muted); margin-top:4px;}\n.nav{flex:1; padding:14px 10px; overflow-y:auto;}\n.nav-item{display:flex; align-items:center; gap:10px; padding:12px 14px; border-radius:12px; cursor:pointer; color:var(--muted); font-size:14px; transition:.15s; margin-bottom:4px;}\n.nav-item:hover{background:rgba(63,107,255,.1); color:#fff;}\n.nav-item.active{background:linear-gradient(135deg,var(--blue-500),var(--blue-400)); color:#fff; font-weight:700; box-shadow:0 6px 18px rgba(43,87,224,.35);}\n.sidebar-footer{padding:14px 18px; font-size:11px; color:var(--muted); border-top:1px solid var(--border);}\n.main{flex:1; min-width:0; display:flex; flex-direction:column;}\n.topbar{background:rgba(15,30,61,.6); backdrop-filter:blur(10px); border-bottom:1px solid var(--border); padding:16px 26px; display:flex; justify-content:space-between; align-items:center; gap:12px;}\n.topbar h2{font-size:19px; color:#fff;}\n.topbar-right{display:flex; align-items:center; gap:10px; flex-wrap:wrap;}\n.user-chip{display:flex; align-items:center; gap:8px; font-size:13.5px; color:var(--muted); background:rgba(255,255,255,.04); padding:7px 12px; border-radius:30px; border:1px solid var(--border);}\n.user-chip b{color:#fff;}\n.user-chip button{background:none; border:none; color:var(--blue-300); font-weight:700; cursor:pointer; font-size:12.5px;}\n.lang-toggle{display:flex; align-items:center; gap:6px; background:rgba(255,255,255,.04); border:1px solid var(--border); padding:7px 14px; border-radius:30px; cursor:pointer; color:var(--muted);}\n.lang-toggle:hover{color:#fff; border-color:var(--blue-400);}\n.content{padding:22px 26px; flex:1;}\n.kpi-grid{display:grid; grid-template-columns:repeat(auto-fit,minmax(190px,1fr)); gap:14px; margin-bottom:22px;}\n.kpi-card{background:linear-gradient(160deg,var(--navy-800),var(--navy-900)); border:1px solid var(--border); border-radius:16px; padding:18px 20px; position:relative; overflow:hidden;}\n.kpi-card::before{content:\"\"; position:absolute; top:0; inset-inline-start:0; width:4px; height:100%; background:var(--blue-400);}\n.kpi-card.red::before{background:var(--red);}\n.kpi-card.green::before{background:var(--green);}\n.kpi-card.amber::before{background:var(--gold);}\n.kpi-num{font-family:'Cairo',sans-serif; font-size:30px; font-weight:800; color:#fff;}\nhtml[data-lang=\"en\"] .kpi-num{font-family:'Inter',sans-serif;}\n.kpi-label{font-size:13px; color:var(--muted); margin-top:4px;}\n.panel{background:linear-gradient(160deg,var(--navy-800),var(--navy-900)); border:1px solid var(--border); border-radius:16px; margin-bottom:20px; overflow:hidden;}\n.panel-head{padding:16px 20px; border-bottom:1px solid var(--border); display:flex; justify-content:space-between; align-items:center; flex-wrap:wrap; gap:10px;}\n.panel-head h3{font-size:16px; color:#fff; display:flex; align-items:center; gap:8px;}\n.panel-body{padding:18px 20px;}\n.bar-row{display:flex; align-items:center; gap:10px; margin-bottom:10px; font-size:13px;}\n.bar-row .lbl{width:170px; flex-shrink:0; color:var(--muted);}\n.bar-track{flex:1; background:var(--navy-950); border-radius:6px; height:16px; overflow:hidden; border:1px solid var(--border);}\n.bar-fill{height:100%; border-radius:6px; transition:width .4s;}\n.activity-row{display:flex; gap:10px; padding:10px 0; border-bottom:1px dashed var(--border); font-size:13.5px; align-items:center; flex-wrap:wrap;}\n.activity-row:last-child{border-bottom:none;}\n.tag{display:inline-block; padding:3px 11px; border-radius:20px; font-size:11.5px; font-weight:700; white-space:nowrap;}\n.tag.neutral{background:rgba(255,255,255,.06); color:var(--muted);}\n.tag.info{background:var(--info-bg); color:var(--info);}\n.tag.warn{background:rgba(224,176,75,.14); color:var(--gold);}\n.tag.danger{background:var(--red-bg); color:var(--red);}\n.tag.ok{background:var(--green-bg); color:var(--green);}\n.mod-chip{display:inline-flex; align-items:center; gap:6px; padding:3px 10px; border-radius:20px; font-size:11px; font-weight:700; background:rgba(63,107,255,.12); color:var(--blue-300);}\n.btn{background:linear-gradient(135deg,var(--blue-500),var(--blue-400)); color:#fff; border:none; padding:11px 20px; border-radius:10px; font-weight:700; font-size:13.5px; cursor:pointer; font-family:inherit; transition:.15s; display:inline-flex; align-items:center; justify-content:center; gap:8px;}\n.btn:hover{transform:translateY(-1px); box-shadow:0 10px 22px rgba(43,87,224,.42);}\n.btn.secondary{background:rgba(255,255,255,.05); color:#fff; border:1px solid var(--border); box-shadow:none;}\n.btn.secondary:hover{background:rgba(255,255,255,.1); transform:none;}\n.btn.danger{background:linear-gradient(135deg,#c94141,var(--red)); box-shadow:0 6px 16px rgba(239,90,90,.3);}\n.btn.small{padding:7px 13px; font-size:12.5px;}\n.toolbar{display:flex; gap:10px; flex-wrap:wrap; margin-bottom:14px;}\n.toolbar input, .toolbar select{padding:10px 14px; border:1px solid var(--border); border-radius:10px; font-family:inherit; font-size:13.5px; background:var(--navy-950); color:#fff;}\n.toolbar input::placeholder{color:var(--muted);}\ntable{width:100%; border-collapse:collapse; font-size:13.5px;}\nthead th{text-align:start; padding:12px 14px; background:rgba(255,255,255,.03); color:var(--muted); font-weight:700; font-size:12px; border-bottom:1px solid var(--border); text-transform:uppercase; letter-spacing:.5px;}\ntbody td{padding:12px 14px; border-bottom:1px solid var(--border); vertical-align:top; color:var(--white);}\ntbody tr:hover{background:rgba(63,107,255,.05);}\n.empty{text-align:center; padding:50px 20px; color:var(--muted);}\n.empty .ic{width:40px; height:40px; margin:0 auto 10px; stroke:var(--muted);}\n.overlay{position:fixed; inset:0; background:rgba(2,6,16,.7); backdrop-filter:blur(3px); display:flex; align-items:center; justify-content:center; z-index:50; padding:16px;}\n.modal{background:linear-gradient(165deg,var(--navy-800),var(--navy-900)); border:1px solid var(--border); border-radius:18px; width:100%; max-width:560px; max-height:88vh; overflow-y:auto; padding:0;}\n.modal-head{padding:18px 22px; border-bottom:1px solid var(--border); display:flex; justify-content:space-between; align-items:center;}\n.modal-head h3{font-size:17px; color:#fff;}\n.modal-head button{background:none; border:none; font-size:22px; cursor:pointer; color:var(--muted); line-height:1;}\n.modal-body{padding:20px 22px;}\n.field{margin-bottom:14px;}\n.field label{display:block; font-size:13px; font-weight:700; margin-bottom:6px; color:var(--blue-300);}\n.field input, .field select, .field textarea{width:100%; padding:11px 13px; border:1px solid var(--border); border-radius:10px; font-family:inherit; font-size:14px; background:var(--navy-950); color:#fff;}\n.field select option{background:var(--navy-900); color:#fff;}\n.field textarea{min-height:80px; resize:vertical;}\n.modal-foot{padding:16px 22px; border-top:1px solid var(--border); display:flex; justify-content:flex-end; gap:10px;}\n.note{background:rgba(63,107,255,.08); border:1px solid rgba(63,107,255,.25); color:var(--blue-300); padding:13px 16px; border-radius:12px; font-size:13px; margin-bottom:16px; display:flex; gap:10px; align-items:flex-start;}\n.badge-actions{display:flex; gap:6px;}\n.gate-screen{min-height:100vh; display:flex; align-items:center; justify-content:center; background:\n  radial-gradient(circle at 20% 20%, rgba(43,87,224,.2), transparent 45%),\n  radial-gradient(circle at 80% 80%, rgba(224,176,75,.1), transparent 40%), var(--navy-950); padding:20px; position:relative;}\n.gate-lang{position:absolute; top:20px; inset-inline-end:20px;}\n.gate-box{background:linear-gradient(165deg,var(--navy-800),var(--navy-900)); border:1px solid var(--border); border-radius:20px; width:100%; max-width:420px; padding:34px 30px; text-align:center;}\n.gate-box .brand-mark{width:64px; height:64px; margin:0 auto 16px;}\n.gate-box h2{font-size:19px; margin-bottom:8px; color:#fff;}\n.gate-box p{font-size:13.5px; color:var(--muted); margin-bottom:18px; line-height:1.7;}\n.gate-box input{width:100%; padding:13px 14px; border:1px solid var(--border); border-radius:10px; font-size:15px; text-align:center; margin-bottom:12px; letter-spacing:2px; background:var(--navy-950); color:#fff;}\n.gate-error{color:var(--red); font-size:13px; margin-bottom:10px; min-height:16px;}\n@media (max-width:820px){\n  #app{flex-direction:column;}\n  .sidebar{width:100%; flex-direction:row; align-items:center;}\n  .sidebar .brand{display:none;}\n  .nav{display:flex; overflow-x:auto; padding:8px; gap:4px;}\n  .nav-item{white-space:nowrap; margin-bottom:0;}\n  .sidebar-footer{display:none;}\n  .content{padding:16px;}\n  table{font-size:12.5px;}\n  .bar-row .lbl{width:110px;}\n}\n</style>\n</head>\n<body>\n<div id=\"app\"></div>\n\n<script>\n/* ============== STORAGE API ============== */\n/**\n * Initialize window.storage with localStorage-based implementation\n * Supports get/set/delete operations with optional secure (indexed) storage\n */\nwindow.storage = {\n  async get(key, isSecure) {\n    try {\n      const fullKey = `hse:${isSecure ? 'secure:' : ''}${key}`;\n      const value = localStorage.getItem(fullKey);\n      return value ? { value } : null;\n    } catch (e) {\n      console.error('Storage get error:', e);\n      return null;\n    }\n  },\n  async set(key, value, isSecure) {\n    try {\n      const fullKey = `hse:${isSecure ? 'secure:' : ''}${key}`;\n      localStorage.setItem(fullKey, value);\n      return true;\n    } catch (e) {\n      console.error('Storage set error:', e);\n      return false;\n    }\n  },\n  async delete(key, isSecure) {\n    try {\n      const fullKey = `hse:${isSecure ? 'secure:' : ''}${key}`;\n      localStorage.removeItem(fullKey);\n      return true;\n    } catch (e) {\n      console.error('Storage delete error:', e);\n      return false;\n    }\n  }\n};\n\n/* ============== ICONS ============== */\nconst ICONS = {\n  dashboard:'<path d=\"M3 3v18h18\"/><path d=\"M7 16v-5\"/><path d=\"M12 16V8\"/><path d=\"M17 16v-8\"/>',\n  observations:'<path d=\"M12 9v4\"/><path d=\"M12 17h.01\"/><path d=\"M10.29 3.86 1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0Z\"/>',\n  incidents:'<path d=\"M12 8v4\"/><path d=\"M12 16h.01\"/><path d=\"M7.86 2h8.28L22 7.86v8.28L16.14 22H7.86L2 16.14V7.86Z\"/>',\n  correctiveActions:'<path d=\"M22 11.5V12a10 10 0 1 1-5.93-9.14\"/><path d=\"m9 11 3 3L22 4\"/>',\n  inspections:'<circle cx=\"11\" cy=\"11\" r=\"8\"/><path d=\"m21 21-4.3-4.3\"/>',\n  documents:'<path d=\"M14.5 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V7.5L14.5 2z\"/><path d=\"M14 2v6h6\"/><path d=\"M16 13H8\"/><path d=\"M16 17H8\"/><path d=\"M10 9H8\"/>',\n  hsePlan:'<rect x=\"3\" y=\"4\" width=\"18\" height=\"18\" rx=\"3\"/><path d=\"M16 2v4\"/><path d=\"M8 2v4\"/><path d=\"M3 10h18\"/>',\n  complaints:'<path d=\"m3 11 18-5v12L3 14v-3z\"/><path d=\"M11.6 16.8a3 3 0 1 1-5.8-1.6\"/>',\n  monthlyAudit:'<path d=\"M22 7 13.5 15.5 8.5 10.5 2 17\"/><path d=\"M16 7h6v6\"/>',\n  user:'<path d=\"M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2\"/><circle cx=\"12\" cy=\"7\" r=\"4\"/>',\n  globe:'<circle cx=\"12\" cy=\"12\" r=\"10\"/><path d=\"M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z\"/><path d=\"M2 12h20\"/>',\n  plus:'<path d=\"M12 5v14\"/><path d=\"M5 12h14\"/>',\n  trash:'<path d=\"M3 6h18\"/><path d=\"M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6\"/><path d=\"M8 6V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2\"/>',\n  pencil:'<path d=\"M17 3a2.85 2.83 0 1 1 4 4L7.5 20.5 2 22l1.5-5.5Z\"/>',\n  clipboard:'<path d=\"M9 3h6v3H9z\"/><path d=\"M9 5H6a2 2 0 0 0-2 2v13a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V7a2 2 0 0 0-2-2h-3\"/>'\n};\nfunction svgIcon(name, cls){ return `<svg class=\"${cls||'icon'}\" viewBox=\"0 0 24 24\">${ICONS[name]||''}</svg>`; }\nfunction logoMark(size){\n  return `<svg viewBox=\"0 0 100 100\" width=\"${size}\" height=\"${size}\">\n    <circle cx=\"50\" cy=\"42\" r=\"38\" fill=\"none\" stroke=\"#3f6bff\" stroke-width=\"4\"/>\n    <path d=\"M30 40 L30 65 Q30 72 40 72 L45 72 Q50 72 50 65 L50 45 Z\" fill=\"#3f6bff\"/>\n    <rect x=\"32\" y=\"38\" width=\"16\" height=\"6\" rx=\"2\" fill=\"#050b17\"/>\n    <path d=\"M63 25 Q78 40 68 58 Q64 66 55 66 Q60 55 55 48 Q52 60 45 66 Q45 50 55 40 Q58 32 63 25 Z\" fill=\"#e0b04b\"/>\n  </svg>`;\n}\n\nfunction escapeHtml(str){\n  if(str===undefined || str===null) return '';\n  return str.toString()\n    .replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')\n    .replace(/\"/g,'&quot;').replace(/'/g,'&#39;');\n}\n\n/* ============== TRANSLATIONS ============== */\nconst UI = {\n  appName:{ar:'نظام إدارة HSE', en:'HSE Management System'},\n  tagline:{ar:'الصحة، السلامة والبيئة', en:'Health, Safety & Environment'},\n  dashboard:{ar:'لوحة المعلومات', en:'Dashboard'},\n  changeUser:{ar:'تغيير الاسم', en:'Change Name'},\n  addNew:{ar:'إضافة جديد', en:'Add New'},\n  actions:{ar:'إجراءات', en:'Actions'},\n  edit:{ar:'تعديل', en:'Edit'},\n  delete:{ar:'حذف', en:'Delete'},\n  search:{ar:'بحث...', en:'Search...'},\n  allStatuses:{ar:'كل الحالات', en:'All Statuses'},\n  noRecords:{ar:'لا توجد سجلات بعد. اضغط \"إضافة جديد\" للبدء.', en:'No records yet. Click \"Add New\" to start.'},\n  save:{ar:'حفظ', en:'Save'},\n  cancel:{ar:'إلغاء', en:'Cancel'},\n  confirmDelete:{ar:'هل أنت متأكد من حذف هذا السجل؟', en:'Are you sure you want to delete this record?'},\n  requiredFieldsMsg:{ar:'الرجاء تعبئة الحقول المطلوبة.', en:'Please fill in all required fields.'},\n  chooseOption:{ar:'— اختر —', en:'— Select —'},\n  dataFooter:{ar:'جميع البيانات محفوظة تلقائياً ومشتركة مع الفريق.', en:'All data saves automatically and is shared with the team.'},\n  welcomeTitle:{ar:'مرحباً 👋', en:'Welcome 👋  await window.storage.get('accessCode', true); }catch(e){ codeRec = null; }\n\n  if(!codeRec){ renderGateSetup(); return; }\n  let authRec = null;\n  try{ authRec = await window.storage.get('authOK', false); }catch(e){ authRec = null; }\n  if(authRec && authRec.value === codeRec.value){\n    state.accessGranted = true;\n    loadStorage();\n    return;\n  }\n  renderGateEnter(codeRec.value);\n}\n\nfunction renderGateSetup(){\n  const el = document.getElementById('app');\n  el.innerHTML = `\n    <div class=\"gate-screen\">\n      <div class=\"gate-lang\">${langToggleBtn()}</div>\n      <div class=\"gate-box\">\n        <div class=\"brand-mark\">${logoMark(64)}</div>\n        <h2>${escapeHtml(t('gateSetupTitle'))}</h2>\n        <p>${escapeHtml(t('gateSetupNote'))}</p>\n        <div class=\"gate-error\" id=\"gErr\"></div>\n        <input type=\"text\" id=\"newCode\" placeholder=\"${escapeHtml(t('newCodePlaceholder'))}\">\n        <button class=\"btn\" style=\"width:100%; justify-content:center;\" id=\"setCodeBtn\">${escapeHtml(t('createCodeBtn'))}</button>\n      </div>\n    </div>\n  `;\n  bindLangToggle(el);\n  el.querySelector('#setCodeBtn').onclick = async ()=>{\n    const val = el.querySelector('#newCode').value.trim();\n    if(!val){ el.querySelector('#gErr').textContent=t('enterCodeMsg'); return; }\n    try{\n      await window.storage.set('accessCode', val, true);\n      await window.storage.set('authOK', val, false);\n    }catch(e){ el.querySelector('#gErr').textContent=t('saveError'); return; }\n    state.accessGranted = true;\n    loadStorage();\n  };\n}\n\nfunction renderGateEnter(realCode){\n  const el = document.getElementById('app');\n  el.innerHTML = `\n    <div class=\"gate-screen\">\n      <div class=\"gate-lang\">${langToggleBtn()}</div>\n      <div class=\"gate-box\">\n        <div class=\"brand-mark\">${logoMark(64)}</div>\n        <h2>${escapeHtml(t('gateEnterTitle'))}</h2>\n        <p>${escapeHtml(t('gateEnterNote'))}</p>\n        <div class=\"gate-error\" id=\"gErr\"></div>\n        <input type=\"text\" id=\"codeInput\" placeholder=\"${escapeHtml(t('codePlaceholder'))}\">\n        <button class=\"btn\" style=\"width:100%; justify-content:center;\" id=\"checkBtn\">${escapeHtml(t('enterBtn'))}</button>\n        <div style=\"margin-top:14px;\"><button id=\"resetCodeLink\" style=\"background:none;border:none;color:var(--muted);font-size:12.5px;text-decoration:underline;cursor:pointer;\">${escapeHtml(t('forgotCode'))}</button></div>\n      </div>\n    </div>\n  `;\n  bindLangToggle(el);\n  el.querySelector('#resetCodeLink').onclick = async ()=>{\n    if(!confirm(t('resetConfirm'))) return;\n    try{\n      await window.storage.delete('accessCode', true);\n      await window.storage.delete('authOK', false);\n    }catch(e){}\n    checkAccess();\n  };\n  el.querySelector('#checkBtn').onclick = async ()=>{\n    const val = el.querySelector('#codeInput').value.trim();\n    if(val !== realCode){ el.querySelector('#gErr').textContent=t('wrongCode'); return; }\n    try{ await window.storage.set('authOK', val, false); }catch(e){}\n    state.accessGranted = true;\n    loadStorage();\n  };\n}\n\n/* ============== DATA LOADING ============== */\nasync function loadStorage(){\n  const el = document.getElementById('app');\n  el.innerHTML = `<div style=\"padding:60px;text-align:center;color:#93a4c4;\">${escapeHtml(t('loadingData'))}</div>`;\n  try{\n    const u = await window.storage.get('username', false);\n    state.username = u ? u.value : null;\n  }catch(e){ state.username = null; }\n\n  for(const key of Object.keys(MODULES)){\n    try{\n      const r = await window.storage.get(key, true);\n      state.data[key] = r ? JSON.parse(r.value) : [];\n    }catch(e){ state.data[key] = []; }\n  }\n  render();\n  if(!state.username){ openUsernamePrompt(); }\n}\n\nasync function saveModule(mod){\n  try{\n    const res = await window.storage.set(mod, JSON.stringify(state.data[mod]), true);\n    if(!res) alert(t('saveDataErrorGeneric'));\n  }catch(e){ alert(t('saveDataErrorGeneric')); }\n}\nasync function saveUsername(name){\n  state.username = name;\n  try{ await window.storage.set('username', name, false); }catch(e){}\n}\n\nfunction openUsernamePrompt(){\n  const wrap = document.createElement('div');\n  wrap.className='overlay';\n  wrap.innerHTML = `\n    <div class=\"modal\" style=\"max-width:400px;\">\n      <div class=\"modal-head\"><h3>${escapeHtml(t('welcomeTitle'))}</h3></div>\n      <div class=\"modal-body\">\n        <div class=\"note\">${svgIcon('user')}<span>${escapeHtml(t('welcomeNote'))}</span></div>\n        <div class=\"field\"><label>${escapeHtml(t('nameLabel'))}</label><input id=\"unameInput\" type=\"text\" placeholder=\"${escapeHtml(t('namePlaceholder'))}\"></div>\n      </div>\n      <div class=\"modal-foot\"><button class=\"btn\" id=\"unameSave\">${escapeHtml(t('saveContinue'))}</button></div>\n    </div>`;\n  document.body.appendChild(wrap);\n  wrap.querySelector('#unameSave').onclick = async ()=>{\n    const val = wrap.querySelector('#unameInput').value.trim() || (state.lang==='ar'?'مستخدم':'User');\n    await saveUsername(val);\n    wrap.remove();\n    render();\n  };\n}\n\nfunction fmtDate(d){ return d ? d : '—'; }\nfunction primaryDateOf(r){ return r.date || r.dueDate || r.month || r.startDate || r.nextDate || ''; }\n\n/* ============== RENDER ============== */\nfunction render(){\n  applyLangToDoc();\n  const el = document.getElementById('app');\n  const navItems = [\n    {id:'dashboard', label:t('dashboard'), icon:'dashboard'},\n    ...Object.entries(MODULES).map(([k,v])=>({id:k, label:v.label[state.lang], icon:v.icon}))\n  ];\n  el.innerHTML = `\n    <div class=\"sidebar\">\n      <div class=\"brand\">\n        <div class=\"brand-mark\">${logoMark(58)}</div>\n        <div class=\"brand-text\">${escapeHtml(t('appName'))}</div>\n        <div class=\"brand-sub\">${escapeHtml(t('tagline'))}</div>\n      </div>\n      <div class=\"grad-bar\"></div>\n      <div class=\"nav\">\n        ${navItems.map(n=>`<div class=\"nav-item ${state.view===n.id?'active':''}\" data-nav=\"${n.id}\">${svgIcon(n.icon)}<span class=\"label\">${escapeHtml(n.label)}</span></div>`).join('')}\n      </div>\n      <div class=\"sidebar-footer\">${escapeHtml(t('dataFooter'))}</div>\n    </div>\n    <div class=\"main\">\n      <div class=\"topbar\">\n        <h2>${state.view==='dashboard' ? escapeHtml(t('dashboard')) : escapeHtml(MODULES[state.view].label[state.lang])}</h2>\n        <div class=\"topbar-right\">\n          ${langToggleBtn()}\n          <div class=\"user-chip\">${svgIcon('user')} <b>${escapeHtml(state.username||'—')}</b> <button id=\"changeUser\">${escapeHtml(t('changeUser'))}</button></div>\n        </div>\n      </div>\n      <div class=\"content\" id=\"content\"></div>\n    </div>\n  `;\n  el.querySelectorAll('[data-nav]').forEach(n=>{ n.onclick = ()=>{ state.view = n.dataset.nav; render(); }; });\n  el.querySelector('#changeUser').onclick = openUsernamePrompt;\n  bindLangToggle(el);\n\n  const content = el.querySelector('#content');\n  if(state.view==='dashboard') renderDashboard(content);\n  else renderModule(content, state.view);\n}\n\nfunction renderDashboard(content){\n  const obs = state.data.observations, inc = state.data.incidents, ca = state.data.correctiveActions, insp = state.data.inspections;\n  const complaints = state.data.complaints, audits = state.data.monthlyAudit;\n  const today = new Date();\n  const openObs = obs.filter(o=>o.status!=='obsClosed').length;\n  const incidents30 = inc.filter(i=>{ if(!i.date) return false; const d=new Date(i.date); const diff=(today-d)/86400000; return diff<=30 && diff>=0; }).length;\n  const overdueCA = ca.filter(a=> a.status!=='caCompleted' && a.dueDate && new Date(a.dueDate) < today).length;\n  const upcomingInsp = insp.filter(i=>{ if(!i.nextDate) return false; const d=new Date(i.nextDate); const diff=(d-today)/86400000; return diff>=0 && diff<=7; }).length;\n  const openComplaints = complaints.filter(c=> c.status!=='resolved' && c.status!=='rejected').length;\n\n  const sevBuckets = {low:0, medium:0, high:0};\n  [...obs,...inc].forEach(x=>{\n    const s = x.severity;\n    if(['low','minor'].includes(s)) sevBuckets.low++;\n    else if(['medium','moderate'].includes(s)) sevBuckets.medium++;\n    else if(['high','major','catastrophic'].includes(s)) sevBuckets.high++;\n  });\n  const maxSev = Math.max(1, sevBuckets.low, sevBuckets.medium, sevBuckets.high);\n  const sevMeta = [\n    ['low', t('sevLowLabel'), 'var(--green)'],\n    ['medium', t('sevMedLabel'), 'var(--gold)'],\n    ['high', t('sevHighLabel'), 'var(--red)']\n  ];\n\n  let all = [];\n  Object.entries(MODULES).forEach(([mkey,mconf])=>{\n    const statusKey = STATUS_FIELD_BY_MODULE[mkey];\n    const statusFieldDef = statusKey ? mconf.fields.find(f=>f.key===statusKey) : null;\n    state.data[mkey].forEach(item=>{\n      all.push({\n        mkey,\n        date:primaryDateOf(item),\n        title:item.description||item.title||item.findings||item.objective||'—',\n        status: statusKey ? item[statusKey] : null,\n        optionSet: statusFieldDef ? statusFieldDef.optionSet : null\n      });\n    });\n  });\n  all.sort((a,b)=> new Date(b.date||0) - new Date(a.date||0));\n  all = all.slice(0,6);\n\n  const latestAudit = [...audits].sort((a,b)=> (b.month||'').localeCompare(a.month||''))[0];\n  const auditFields = MODULES.monthlyAudit.fields;\n  const kpiKeys = ['kpiIncidents','kpiNearMiss','kpiTrainingCompliance','kpiCorrectiveClosed','kpiInspectionScore'];\n\n  content.innerHTML = `\n    <div class=\"kpi-grid\">\n      <div class=\"kpi-card\"><div class=\"kpi-num\">${openObs}</div><div class=\"kpi-label\">${escapeHtml(t('kpiOpenObs'))}</div></div>\n      <div class=\"kpi-card ${incidents30>0?'red':'green'}\"><div class=\"kpi-num\">${incidents30}</div><div class=\"kpi-label\">${escapeHtml(t('kpiIncidents30'))}</div></div>\n      <div class=\"kpi-card ${overdueCA>0?'red':'green'}\"><div class=\"kpi-num\">${overdueCA}</div><div class=\"kpi-label\">${escapeHtml(t('kpiOverdueCA'))}</div></div>\n      <div class=\"kpi-card\"><div class=\"kpi-num\">${upcomingInsp}</div><div class=\"kpi-label\">${escapeHtml(t('kpiUpcomingInsp'))}</div></div>\n      <div class=\"kpi-card ${openComplaints>0?'amber':'green'}\"><div class=\"kpi-num\">${openComplaints}</div><div class=\"kpi-label\">${escapeHtml(t('kpiOpenComplaints'))}</div></div>\n    </div>\n    ${latestAudit ? `\n    <div class=\"panel\">\n      <div class=\"panel-head\"><h3>${svgIcon('monthlyAudit')}${escapeHtml(t('latestAudit'))} — ${escapeHtml(latestAudit.month||'')}</h3></div>\n      <div class=\"panel-body kpi-grid\" style=\"margin-bottom:0;\">\n        ${kpiKeys.map(k=>{\n          const f = auditFields.find(x=>x.key===k);\n          const suffix = k.includes('Compliance')||k.includes('Closed')||k.includes('Score') ? '%' : '';\n          return `<div class=\"kpi-card\"><div class=\"kpi-num\">${latestAudit[k]||0}${suffix}</div><div class=\"kpi-label\">${escapeHtml(f.label[state.lang])}</div></div>`;\n        }).join('')}\n      </div>\n    </div>` : ''}\n    <div class=\"panel\">\n      <div class=\"panel-head\"><h3>${escapeHtml(t('severityDist'))}</h3></div>\n      <div class=\"panel-body\">\n        ${sevMeta.map(([k,label,color])=>`\n          <div class=\"bar-row\">\n            <div class=\"lbl\">${escapeHtml(label)}</div>\n            <div class=\"bar-track\"><div class=\"bar-fill\" style=\"width:${(sevBuckets[k]/maxSev*100)}%; background:${color};\"></div></div>\n            <div style=\"width:24px; text-align:center; font-weight:700;\">${sevBuckets[k]}</div>\n          </div>`).join('')}\n        ${(obs.length+inc.length===0) ? `<div class=\"empty\" style=\"padding:16px 0;\">${escapeHtml(t('noSeverityData'))}</div>`:''}\n      </div>\n    </div>\n    <div class=\"panel\">\n      <div class=\"panel-head\"><h3>${escapeHtml(t('recentActivities'))}</h3></div>\n      <div class=\"panel-body\">\n        ${all.length ? all.map(a=>`\n          <div class=\"activity-row\">\n            <div style=\"width:110px; flex-shrink:0; color:var(--muted); font-size:12px;\">${escapeHtml(fmtDate(a.date))}</div>\n            <div style=\"width:190px; flex-shrink:0;\">${modChip(a.mkey)}</div>\n            <div style=\"flex:1; min-width:150px;\">${escapeHtml((a.title||'').toString().slice(0,90))}</div>\n            <div>${tag(a.status, a.optionSet)}</div>\n          </div>`).join('') : `<div class=\"empty\">${svgIcon('clipboard','ic')}${escapeHtml(t('noActivities'))}</div>`}\n      </div>\n    </div>\n  `;\n}\n\nfunction renderModule(content, mod){\n  const conf = MODULES[mod];\n  const filt = state.filters[mod] || {status:'', q:''};\n  state.filters[mod] = filt;\n\n  const statusField = conf.fields.find(f=>f.key==='status') || conf.fields.find(f=>f.key==='overallStatus');\n  const statusOptions = statusField ? OPTION_SETS[statusField.optionSet] : [];\n  const styledKeys = ['status','severity','priority','overallStatus'];\n\n  let rows = state.data[mod];\n  if(filt.status && statusField) rows = rows.filter(r=> r[statusField.key]===filt.status);\n  if(filt.q){\n    const q = filt.q.toLowerCase();\n    rows = rows.filter(r=> Object.values(r).some(v=> (v||'').toString().toLowerCase().includes(q)));\n  }\n  rows = [...rows].sort((a,b)=> new Date(primaryDateOf(b)||0) - new Date(primaryDateOf(a)||0));\n\n  content.innerHTML = `\n    <div class=\"panel\">\n      <div class=\"panel-head\">\n        <h3>${svgIcon(conf.icon)}${escapeHtml(conf.label[state.lang])} <span style=\"color:var(--muted); font-weight:400; font-size:13px;\">(${state.data[mod].length})</span></h3>\n        <button class=\"btn\" id=\"addBtn\">${svgIcon('plus')}${escapeHtml(t('addNew'))}</button>\n      </div>\n      <div class=\"panel-body\" style=\"padding-bottom:0;\">\n        <div class=\"toolbar\">\n          <input type=\"text\" id=\"searchInput\" placeholder=\"${escapeHtml(t('search'))}\" value=\"${escapeHtml(filt.q||'')}\">\n          ${statusOptions.length ? `<select id=\"statusFilter\"><option value=\"\">${escapeHtml(t('allStatuses'))}</option>${statusOptions.map(o=>`<option value=\"${o.v}\" ${filt.status===o.v?'selected':''}>${escapeHtml(o[state.lang])}</option>`).join('')}</select>`:''}\n        </div>\n      </div>\n      <div style=\"overflow-x:auto;\">\n        ${rows.length ? `\n        <table>\n          <thead><tr>${conf.columns.map(c=>`<th>${escapeHtml(conf.fields.find(f=>f.key===c).label[state.lang])}</th>`).join('')}<th>${escapeHtml(t('actions'))}</th></tr></thead>\n          <tbody>\n            ${rows.map(r=>`\n              <tr>\n                ${conf.columns.map(c=>{\n                  const f = conf.fields.find(x=>x.key===c);\n                  const val = r[c]||'';\n                  if(styledKeys.includes(c)) return `<td>${tag(val, f.optionSet)}</td>`;\n                  if(f.type==='select') return `<td>${escapeHtml(optLabel(val, f.optionSet))||'—'}</td>`;\n                  if(f.type==='textarea') return `<td>${escapeHtml((val||'').toString().slice(0,70))}${val.length>70?'…':''}</td>`;\n                  return `<td>${escapeHtml(val)||'—'}</td>`;\n                }).join('')}\n                <td>\n                  <div class=\"badge-actions\">\n                    <button class=\"btn small secondary\" data-edit=\"${r.id}\">${svgIcon('pencil')}</button>\n                    <button class=\"btn small danger\" data-del=\"${r.id}\">${svgIcon('trash')}</button>\n                  </div>\n                </td>\n              </tr>\n            `).join('')}\n          </tbody>\n        </table>` : `<div class=\"empty\">${svgIcon(conf.icon,'ic')}${escapeHtml(t('noRecords'))}</div>`}\n      </div>\n    </div>\n    ${mod==='documents' ? `<div class=\"note\">${svgIcon('documents')}<span>${escapeHtml(t('documentsNote'))}</span></div>` : ''}\n    ${mod==='complaints' ? `<div class=\"note\">${svgIcon('complaints')}<span>${escapeHtml(t('complaintsNote'))}</span></div>` : ''}\n  `;\n\n  content.querySelector('#addBtn').onclick = ()=> openForm(mod, null);\n  content.querySelectorAll('[data-edit]').forEach(b=> b.onclick = ()=> openForm(mod, b.dataset.edit));\n  content.querySelectorAll('[data-del]').forEach(b=> b.onclick = ()=> deleteRow(mod, b.dataset.del));\n\n  const searchInput = content.querySelector('#searchInput');\n  searchInput.oninput = (e)=>{\n    filt.q = e.target.value;\n    const cursorPos = e.target.selectionStart;\n    renderModule(content, mod);\n    const newInput = content.querySelector('#searchInput');\n    if(newInput){\n      newInput.focus();\n      try{ newInput.setSelectionRange(cursorPos, cursorPos); }catch(err){}\n    }\n  };\n  const sf = content.querySelector('#statusFilter');\n  if(sf) sf.onchange = (e)=>{ filt.status = e.target.value; renderModule(content, mod); };\n}\n\nfunction openForm(mod, id){\n  const conf = MODULES[mod];\n  const existing = id ? state.data[mod].find(r=>r.id===id) : null;\n  const wrap = document.createElement('div');\n  wrap.className = 'overlay';\n  wrap.innerHTML = `\n    <div class=\"modal\">\n      <div class=\"modal-head\"><h3>${existing?escapeHtml(t('edit')):escapeHtml(t('addNew'))} — ${escapeHtml(conf.label[state.lang])}</h3><button id=\"closeModal\">×</button></div>\n      <div class=\"modal-body\">\n        ${conf.fields.map(f=>{\n          const val = existing ? (existing[f.key]||'') : '';\n          if(f.type==='select'){\n            const opts = OPTION_SETS[f.optionSet];\n            return `<div class=\"field\"><label>${escapeHtml(f.label[state.lang])}</label><select data-field=\"${f.key}\">\n              <option value=\"\">${escapeHtml(t('chooseOption'))}</option>\n              ${opts.map(o=>`<option value=\"${o.v}\" ${val===o.v?'selected':''}>${escapeHtml(o[state.lang])}</option>`).join('')}\n            </select></div>`;\n          }\n          if(f.type==='textarea'){\n            return `<div class=\"field\"><label>${escapeHtml(f.label[state.lang])}</label><textarea data-field=\"${f.key}\">${escapeHtml(val)}</textarea></div>`;\n          }\n          return `<div class=\"field\"><label>${escapeHtml(f.label[state.lang])}</label><input type=\"${f.type}\" data-field=\"${f.key}\" value=\"${escapeHtml(val)}\"></div>`;\n        }).join('')}\n      </div>\n      <div class=\"modal-foot\">\n        <button class=\"btn secondary\" id=\"cancelBtn\">${escapeHtml(t('cancel'))}</button>\n        <button class=\"btn\" id=\"saveBtn\">${escapeHtml(t('save'))}</button>\n      </div>\n    </div>\n  `;\n  document.body.appendChild(wrap);\n  const close = ()=> wrap.remove();\n  wrap.querySelector('#closeModal').onclick = close;\n  wrap.querySelector('#cancelBtn').onclick = close;\n  wrap.addEventListener('click', (e)=>{ if(e.target===wrap) close(); });\n\n  wrap.querySelector('#saveBtn').onclick = async ()=>{\n    const record = existing ? {...existing} : {id: 'r'+Date.now()+Math.random().toString(36).slice(2,7), createdBy: state.username, createdAt: new Date().toISOString()};\n    let missingRequired = false;\n    conf.fields.forEach(f=>{\n      const input = wrap.querySelector(`[data-field=\"${f.key}\"]`);\n      record[f.key] = input.value;\n      if(f.required && !input.value) missingRequired = true;\n    });\n    if(missingRequired){ alert(t('requiredFieldsMsg')); return; }\n    if(existing){\n      const idx = state.data[mod].findIndex(r=>r.id===existing.id);\n      state.data[mod][idx] = record;\n    } else {\n      state.data[mod].push(record);\n    }\n    await saveModule(mod);\n    close();\n    render();\n  };\n}\n\nasync function deleteRow(mod, id){\n  if(!confirm(t('confirmDelete'))) return;\n  state.data[mod] = state.data[mod].filter(r=>r.id!==id);\n  await saveModule(mod);\n  render();\n}\n\ncheckAccess();\n</script>\n</body>\n</html>",
  "message": "إنشاء ملف index.html لإصلاح GitHub Pages"
